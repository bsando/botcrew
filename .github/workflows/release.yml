name: Build, Sign & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  SCHEME: Botcrew
  PRODUCT_NAME: BotCrew
  DERIVED_DATA: /tmp/DerivedData

jobs:
  release:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "version=$TAG" >> "$GITHUB_OUTPUT"
          echo "Building version: $TAG"

      - name: Import signing certificate
        env:
          P12_BASE64: ${{ secrets.DEVELOPER_ID_CERTIFICATE_P12 }}
          P12_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
        run: |
          # Decode certificate (trap ensures cleanup on failure)
          trap 'rm -f certificate.p12' EXIT
          echo "$P12_BASE64" | base64 --decode > certificate.p12

          # Create temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          KEYCHAIN_PASSWORD=$(uuidgen)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          security import certificate.p12 -k "$KEYCHAIN_PATH" -P "$P12_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain

          # Clean up
          rm certificate.p12

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build for release
        env:
          DEVELOPMENT_TEAM: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcodebuild -scheme "$SCHEME" \
            -configuration Release \
            -derivedDataPath "$DERIVED_DATA" \
            -destination 'platform=macOS' \
            DEVELOPMENT_TEAM="$DEVELOPMENT_TEAM" \
            build

      - name: Locate built app
        id: app
        run: |
          APP_PATH=$(find "$DERIVED_DATA/Build/Products/Release" -name "*.app" -maxdepth 1 | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "::error::No .app bundle found in build products"
            exit 1
          fi
          echo "path=$APP_PATH" >> "$GITHUB_OUTPUT"
          echo "Found app at: $APP_PATH"

      - name: Verify code signature
        run: |
          codesign --verify --deep --strict "${{ steps.app.outputs.path }}"
          echo "Code signature verified."

      - name: Notarize app
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # Create zip for notarization
          ditto -c -k --keepParent "${{ steps.app.outputs.path }}" "$PRODUCT_NAME.zip"

          # Submit for notarization
          xcrun notarytool submit "$PRODUCT_NAME.zip" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          # Staple the ticket
          xcrun stapler staple "${{ steps.app.outputs.path }}"

          rm "$PRODUCT_NAME.zip"

      - name: Create DMG
        id: dmg
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          bash scripts/create-dmg.sh "${{ steps.app.outputs.path }}" "$VERSION"
          DMG_PATH="${PRODUCT_NAME}-${VERSION}.dmg"
          echo "path=$DMG_PATH" >> "$GITHUB_OUTPUT"

      - name: Notarize DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool submit "${{ steps.dmg.outputs.path }}" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          xcrun stapler staple "${{ steps.dmg.outputs.path }}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          gh release create "v${VERSION}" \
            "${{ steps.dmg.outputs.path }}" \
            --title "BotCrew v${VERSION}" \
            --generate-notes
