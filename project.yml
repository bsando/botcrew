name: Botcrew
options:
  bundleIdPrefix: com.redwoodfog
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.0"

targets:
  Botcrew:
    type: application
    platform: macOS
    sources:
      - Botcrew
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.redwoodfog.botcrew
        SWIFT_VERSION: "5.10"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        PRODUCT_NAME: BotCrew
        PRODUCT_MODULE_NAME: Botcrew
        INFOPLIST_FILE: Botcrew/Info.plist
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0
        CODE_SIGN_IDENTITY: "Developer ID Application"
        CODE_SIGN_STYLE: Manual
        DEVELOPMENT_TEAM: "$(DEVELOPMENT_TEAM)"
        CODE_SIGNING_REQUIRED: YES
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_ENTITLEMENTS: Botcrew/Botcrew.entitlements
        OTHER_CODE_SIGN_FLAGS: "--timestamp"

  BotcrewTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - BotcrewTests
    dependencies:
      - target: Botcrew
    settings:
      base:
        SWIFT_VERSION: "5.10"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/BotCrew.app/Contents/MacOS/BotCrew"

  BotcrewUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - BotcrewUITests
    dependencies:
      - target: Botcrew
    settings:
      base:
        SWIFT_VERSION: "5.10"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        GENERATE_INFOPLIST_FILE: YES
